<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Profile Preview - Leave Management System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            padding: 15px 25px;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .logout-btn {
            margin-left: 15px;
            text-decoration: none;
            color: #f39c12;
            font-weight: bold;
        }

        .logout-btn:hover {
            text-decoration: underline;
        }

        /* LAYOUT */
        .main-container {
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background-color: #34495e;
            min-height: 100vh;
            padding-top: 20px;
        }

        .nav-link {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-link:hover {
            background-color: #1abc9c;
        }

        /* CONTENT */
        .content {
            flex: 1;
            padding: 30px;
        }

        .content-card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
            max-width: 700px;
        }

        .page-subtitle {
            margin-bottom: 25px;
            color: gray;
            font-size: 14px;
        }

        /* PROFILE */
        .profile-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .profile-row label {
            font-weight: bold;
            font-size: 14px;
            color: #555;
        }

        .profile-row span {
            font-size: 14px;
        }

        .active-status {
            color: green;
            font-weight: bold;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 12px;
            background-color: #2c3e50;
            color: white;
            font-size: 13px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">
        Leave Management System
    </div>

    <div>
        Welcome, John
        <a href="#" class="logout-btn">Logout</a>
    </div>
</header>

<div class="main-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <a href="#" class="nav-link">Dashboard</a>
        <a href="#" class="nav-link">Apply Leave</a>
        <a href="#" class="nav-link">My Leaves</a>
        <a href="#" class="nav-link">Leave Balances</a>
        <a href="#" class="nav-link">Profile</a>
    </aside>

    <!-- CONTENT -->
    <section class="content">
        <div class="content-card">

            <h2>My Profile</h2>
            <p class="page-subtitle">View your account details</p>

            <div class="profile-row">
                <label>Full Name</label>
                <span>John Doe</span>
            </div>

            <div class="profile-row">
                <label>Username</label>
                <span>johndoe</span>
            </div>

            <div class="profile-row">
                <label>Email</label>
                <span>john@example.com</span>
            </div>

            <div class="profile-row">
                <label>Role</label>
                <span>EMPLOYEE</span>
            </div>

            <div class="profile-row">
                <label>Status</label>
                <span class="active-status">ACTIVE</span>
            </div>

            <div class="profile-row">
                <label>Joining Date</label>
                <span>10-Jan-2024</span>
            </div>

            <div class="profile-row">
                <label>Account Created</label>
                <span>10-Jan-2024</span>
            </div>

        </div>
    </section>

</div>

<!-- FOOTER -->
<footer class="footer">
    © 2026 Leave Management System | Final Year Project
</footer>

</body>
</html>
