<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Apply Leave', ~{::body})}">

<body>

<h2>Apply Leave</h2>
<p class="page-subtitle">Submit a new leave request</p>

<form method="post" action="/employee/apply-leave" class="form-container">

    <!-- Leave Type -->
    <div class="form-group">
        <label>Leave Type</label>
        <select name="leaveTypeId" required>
            <option value="">-- Select Leave Type --</option>

            <!-- Dynamic later -->
            <option th:each="type : ${leaveTypes}"
                    th:value="${type.id}"
                    th:text="${type.name}">
            </option>

            <!-- Temporary static fallback (remove later) -->
            <!--
            <option value="1">SICK</option>
            <option value="2">CASUAL</option>
            -->
        </select>
    </div>

    <!-- Start Date -->
    <div class="form-group">
        <label>Start Date</label>
        <input type="date" name="startDate" required>
    </div>

    <!-- End Date -->
    <div class="form-group">
        <label>End Date</label>
        <input type="date" name="endDate" required>
    </div>

    <!-- Reason -->
    <div class="form-group">
        <label>Reason</label>
        <textarea name="reason" rows="4"
                  placeholder="Enter reason for leave..."
                  required></textarea>
    </div>

    <button type="submit" class="primary-btn">Submit Request</button>

</form>

<!-- Success / Error Placeholder -->
<div th:if="${success}" class="success-msg">
    Leave request submitted successfully.
</div>

<div th:if="${error}" class="error-msg">
    <span th:text="${error}"></span>
</div>

</body>
</html>
